<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Object #JS</title>
    <link rel="stylesheet" href="master.css">
    <link rel="icon" href="images/location.png">
</head>

<body>
    <div class="redirect-cont">
        <label for="inp">Write The Link</label>
        <input type="text" name="Link" id="inp">
        <div class="buttons">
            <button class="go">Go (assign)</button>
            <button class="replace">Replace</button>
            <button class="reload">Reload</button>
        </div>
    </div>
    <div class="info-cont">
        <h2>Information</h2>
        <div>
            <h3>href:</h3><span>google.com</span>
        </div>
        <div>
            <h3>protocol:</h3><span>yahoo</span>
        </div>
        <div>
            <h3>host:</h3><span>facebook</span>
        </div>
        <div>
            <h3>hostname:</h3><span>youtube</span>
        </div>
    </div>

    <script src="main.js" defer></script>
</body>

</html>
